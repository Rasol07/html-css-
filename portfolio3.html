<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name = "viewport" content = "width=device-width, inital-scale = 1.0">
    <title>Admin Page</title>
    <link href = "css/admin.css" rel = "stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
</head>
<body>
    <div class = "menu-container">
        <i class="fas fa-home"></i>
        <i class="fas fa-headphones"></i>
        <i class="fas fa-flag"></i>
        <i class="fas fa-chart-pie"></i>
    </div>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <form class="d-flex">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-success btn-search" type="submit">
                    <i class="fas fa-search"></i>
                </button>
            </form>
            
            <div class = "right-container">
                <a class="navbar-brand me-4" href="#">
                    <i class="fas fa-bell"></i>
                </a>
                <a class="navbar-brand me-4" href="#">
                    <i class="fas fa-envelope"></i>
                </a>
                <span class="navbar-brand mb-0 h1 me-4">Rasol</span>
            </div>
        </div>
    </nav>

    <div class = "content-container">
        <h2>
            Dashboard
        </h2>
        <div style="height : 20px;"></div>
        <div class = "dashboard-container">
            <div class = "dashboard dashboard-box1">
                <div class = "inside-box">
                    <div class = "content">
                        <p>
                        Earnings (Monthly)
                        </p>
                        <h3>
                            $400,000
                        </h3>
                    </div>
                    <i class="fas fa-calendar fa-3x"></i>
                </div>
            </div>
            <div class = "dashboard dashboard-box2">
                <div class = "inside-box">
                    <div class = "content">
                        <p>
                        Earnings (Annual)
                        </p>
                        <h3>
                            $800,000
                        </h3>
                    </div>
                    <i class="fas fa-dollar-sign fa-3x"></i>
                </div>
            </div>
            <div class = "dashboard dashboard-box3">
                <div class = "inside-box">
                    <div class = "content">
                        <p>
                        Tasks
                        </p>
                        <h3>
                            13
                        </h3>
                    </div>
                    <i class="fas fa-tasks fa-3x"></i>
                </div>
            </div>
            <div class = "dashboard dashboard-box4">
                <div class = "inside-box">
                    <div class = "content">
                        <p>
                        Requests
                        </p>
                        <h3>
                            26
                        </h3>
                    </div>
                    <i class="fas fa-comments fa-3x"></i>
                </div>
            </div>
        </div>

        <div style="height : 30px;"></div>

        <div class = "sub-container">
            <div class = "chart-container">
                        <div class = "chart-container-name">
                            <h3>
                            Earnings Overview                
                            </h3>
                        </div>
                        <hr>
                        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
                        <canvas id="myChart"></canvas>

                        <script>
                        var ctx = document.getElementById('myChart').getContext('2d');
                        var myChart = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: ['January', 'February', 'March', 'April', 'May', 'June', 'July'],
                                datasets: [{
                                    label: 'Monthly',
                                    data: [0, 10, 5, 3, 20, 45],
                                    fill:true,
                                    backgroundColor: 'rgba(114, 81, 145, 0.2)',
                                    borderColor: 'rgb(114, 81, 145)',
                                    borderWidth: 1,
                                    tension : 0.4
                                }]
                            },
                            options: {
                                scales: {
                                    y: {
                                        beginAtZero: true
                                    }
                                }
                            }
                        });
                        </script>
                    </div>
                <div class = "task-container">
                    <ul class="list-group">
                        <li class="list-group-item opacity-0">Tasks</li>
                        <li class="list-group-item d-flex justify-content-between align-items-start">Borrowed Items
                            <span class="badge bg-primary rounded-pill">14</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-start">Trello requests
                            <span class="badge bg-primary rounded-pill">2</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-start">Marked Comments
                            <span class="badge bg-primary rounded-pill">1</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
