<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <link rel = "stylesheet" href = "diary.css">
    <link rel = "stylesheet" href = "pretendard.css">
    <title>다이어리</title>
</head>
<body>
    <!-- 왼쪽 -->
    <div class = "left-container">
        <!-- 캐릭터 얼굴 -->
        <div class = "character">
            
            <img src = "일러스트505.png">

            <!-- 캐릭터 대사 -->
            <p class = "name">
                추세아
            </p>
            <p class = "reaction">
                반응란입니다.
            </p>
        </div>

        <hr style = "margin-top : 20px; margin-bottom: 40px;">
        
        <!-- 달력 -->
        <div class = "calendar">
            <!-- 달력 헤더 오늘 월 적어놓는 거 -->
            <div class = "calendar-header">
                <button class = "prev-button"> < </button>
                <span class = "current"> 2026. 6 </span>
                <button class = "next-button"> > </button> 
            </div>
            <!-- 요일 -->
            <div class = "calendar-days">
                <span> 일 </span>
                <span> 월 </span>
                <span> 화 </span>
                <span> 수 </span>
                <span> 목 </span>
                <span> 금 </span>
                <span> 토 </span>
            </div>
            <hr style = "margin-top : 1px; margin-bottom: 8px;">

            <!-- 날들 -->
            <div class = "calendar-dates">
               
                
            </div>
        </div>
 
        <!-- 투두 리스트 -->
        <div class = "todoList-container">
            <div class = "todo-wrapper">
                
            </div>
            

            <button class = "plus-todolist">+</button>
        </div>
    </div>
        

    <!-- 오른쪽 -->
    <div class = "right-container">
        <!-- 일기 목록들 -->
        <div class = "current-date">
            
        </div>
        <div class = "diary-container">
            
        </div>
    </div>


    <!-- 모달창 -->
    <div class = "modal-background"> </div>
    <div class = "diary-enter">
        <input type="text" class="title-enter" placeholder="제목">
        <textarea class = "content-enter" placeholder="내용"></textarea>
        <div class = "diary-button">
            <button class = "diary-save">저장</button>
            <button class = "diary-close">닫기</button>
        </div>
        
    </div>
    <!-- +버튼 -->
    <button class = "plus-button"> + </button>

   
    <script src = "calendar.js"></script>
    <script src = "todolist.js"></script>
    <script src = "diary.js"></script>
</body>
</html>
