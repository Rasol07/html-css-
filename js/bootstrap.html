    <script>
        setTimeout (function(){
            $('.alert').hide();
        }, 5000);

        //setInterval()은 시간 간격마다 function을 실행

        let timeCount = 5;
        setInterval(function(){
            timeCount--;
            if(timeCount == 0) {
                $('.alert').hide();
                return;
            }
            else{
                $('.alert').html(timeCount + '초 이내 구매시 사은품 증정!');
            }
        }, 1000);
    </script>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script>

        document.getElementsByClassName('navbar-toggler')[0].addEventListener(

        $('#test-btn').on('click', function(){

        document.querySelector('.homework-btn').addEventListener('click',function(){
            $('.black-bg').addClass('show-modal');
            
        })

        document.getElementsByClassName('btn-danger')[0].addEventListener('click', function(){
            $('.black-bg').removeClass('show-modal');

        // 이벤트 함수 알아보기
        // 왜냐하면 우리 이벤트 버블링 때문에. - 클릭할 때 한 번 생각해봐라.

        //e.target : 유저가 실제로 누른 거
        // e.currentTarget : 이벤트 리스너 달린 곳 
        // this 랑 같다. 
        // e.preventDefault() : 이벤트의 기본 동작을 막아주세요. submit 같은 거
        // e.stopPropagation : 상위요소 이벤트 버블링 막아주세요

       // 또 저거는 jQuery로 하면 안되네 - 뭔가 다름
       // jQuery로 할려면 jQuery 형태로 하기 

        document.querySelector('.black-bg').addEventListener('click', function(e){
            console.log(e.target); // 이건 진짜진짜지지닌짜 누른거
            console.log(document.querySelector('.black-bg')); 
            console.log(e.currentTarget); // 이벤트 리스너 위에 black-bg였어서 이거 가져옴!
            if(e.target == document.querySelector('.black-bg')){
                document.querySelector('.black-bg').classList.remove('show-modal');
            }
        })
        

        // 전송 버튼 누르고 input 입력값이 공백이면 알림창 띄우기 (alert)
        document.querySelector('.btn-primary').addEventListener('click', function(event){
            const inputID = document.querySelectorAll('.form-control')[0].value;
            const inputPW = document.querySelectorAll('.form-control')[1].value;
            if(inputID == ''){
                event.preventDefault(); // 전송 막기
                alert('아이디를 입력하세요');
            }
            if (!/\S+@\S+\.\S+/.test(inputID)) {
                event.preventDefault();
                alert('이메일 형식이 아닙니다.');
            }
            if(/[A-Z]/.test(inputPW)){
                event.preventDefault();
                alert('비밀번호에 대문자가 포함되어 있습니다.');
            }
            if(inputPW == ''){
                event.preventDefault();
                alert('비밀번호를 입력하세요');
            }
            else if(inputPW.length < 6){
                event.preventDefault();
                alert('비밀번호를 6자 이상 입력하세요.');
            }
        })

        // /a/ 정규식 - 문자를 담을 수 /a/.test('abcde') -> 'abcde' 안에 a가 있는지. 
        // includes()와의 다른 것. 
        // /[a-z]/.test('abcde') 범위 설정 가능함 한글도 가능함

            // }

            //let은 그냥 변수 선언. const는 상수 선언함.
            let last = num % 10;
            if(last == 3 || last == 6 || last == 9) {
                console.log('박수');
            }
            else {
                console.log('통과');
            }
        }

        function test(score1, score2){
            if(score1 <0 || score1 > 100 || score2 < 0 || score2 > 100){
                alert('점수를 0이상 100이하의 값으로 넣어주세요.');
                return;
            }
            if((score1 + score2 >= 120)){
                if(score1 > 40 && score2> 40){
                    console.log('합격');
                }
                else {
                    console.log('불합격');
                }
            }
            else {
                console.log('불합격');
            }
        }

        game(13);

        // 다크모드 만들기

        // 근데 toggle로 하면 안될 것 같으니까 짝수 홀수로 구분해서 넣으면 될듯
        let count = 0;

                else {
