    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    

    <script>
        let currentSlide = 1;

        $('.slide-1').on('click', function() {
            $('.slide-container').css('transform', 'translateX(0vw)');
            currentSlide = 1;
            console.log('slide-1 clicked');
        })
        $('.slide-2').on('click', function() {
            $('.slide-container').css('transform', 'translateX(-100vw)');
            currentSlide = 2;
            console.log('slide-2 clicked');
        })
        $('.slide-3').on('click', function() {
            $('.slide-container').css('transform', 'translateX(-200vw)');
            currentSlide = 3;
            console.log('slide-3 clicked');
        })


        $('.next').on('click', function() {
            if(currentSlide < 3) {
                $('.slide-container').css('transform', `translateX(-${currentSlide*100}vw)`); // 변수 쓸 때는 이런식으로 하네
                currentSlide++;
            }
            else {
                $('.slide-container').css('transform', 'translateX(0vw)');
                currentSlide = 1;
            }
        })

        function cal(a, b){
            let answer;
            answer = (60 * a + b) * 1000;
            return answer;
        }

        console.log(cal(1,30));
        
        // 스크롤바 관련 - window 안에 있는 document
        // $(window).on('scroll', function(){})
        // window.addEventListener('scroll', function(){
        //     // 얼마나 내렸는지.
        //     // console.log(window.scrollY);
        // })

        // 1. 전체 스크롤바를 100px 내리면 폰트 사이즈 작게.
       $(window).on('scroll', function(){
        if ($(window).scrollTop() >= 100) {
            $('.nav-link').attr('style', 'font-size: 18px !important;');
            $('.navbar-brand i').css('font-size', '25px');
            $('.main-nav').css('background-color', 'rgba(54, 54, 54, 0.8)');
        }
        else {
            $('.nav-link').attr('style', 'font-size: 13px !important;');
            $('.navbar-brand i').css('font-size', '20px');
            $('.main-nav').css('background-color', 'transparent');
        }
       })

       // 2. 박스 끝까지 스크롤 하면 알림 띄우기
       $('.comment').on('scroll', function(){
        let userScroll = $('.comment').scrollTop();
        let divHeight = document.querySelector('.comment').clientHeight;
        let height = document.querySelector('.comment').scrollHeight;

        console.log(height);
        console.log(divHeight);
        console.log(userScroll);
        if(userScroll + divHeight > height - 10 ) {
            alert('그 글을 다 읽었네 ㅅㄱ');
            // 한번만 실행하기
            $(this).off('scroll');
            console.log('확인');
        }
       })
    </script>
